---
- name: Update apt cache
  ansible.builtin.import_tasks: apt_update.yml
  tags: [apt, update]

- name: Autoremove unused packages
  ansible.builtin.import_tasks: apt_autoremove.yml
  tags: [apt, autoremove]

- name: Job Summary Output
  ansible.builtin.debug:
    msg: |
      ============================================
      AUTOREMOVE PACKAGES SUMMARY
      ============================================
      Hostname: {{ ansible_hostname }} (IP: {{ inventory_hostname }})
      Autoremove changed: {{ apt_autoremove_result.changed | default(false) }}
      {% if apt_autoremove_result is defined and apt_autoremove_result.changed %}
      Packages were auto-removed.
      
      List of removed packages:
      {{ apt_autoremove_result.stdout | default('No details available') }}
      {% else %}
      No packages were auto-removed.
      {% endif %}
      ============================================
  tags: [summary]
